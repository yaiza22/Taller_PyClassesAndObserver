name: Validar progreso de misiones

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - closed
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validar-progreso:
    name: Revisar mision activa
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar progreso y comentar issue
        run: npm run validate:progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

