name: Iniciar practica

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  crear-issues-iniciales:
    name: Crear primera mision
    if: ${{ github.event.repository.is_template != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Crear issues iniciales
        run: npm run create:initial-issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Eliminar workflow de inicio
        id: eliminar-workflow
        if: ${{ success() && github.ref == 'refs/heads/main' && github.event.repository.is_template != true }}
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/iniciar-practica.yml
          git commit -m "Desactiva workflow de inicio de practica [skip ci]"
          git push

      - name: Deshabilitar workflow de inicio si no se pudo eliminar
        if: ${{ success() && github.ref == 'refs/heads/main' && github.event.repository.is_template != true && steps.eliminar-workflow.outcome == 'failure' }}
        run: |
          curl -sSL \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/iniciar-practica.yml/disable"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
